<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MultiTool Pro</title>
<link rel="icon" type="image/png" href="logo_web.png" />
<link rel="apple-touch-icon" href="logo_web.png" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0F0E;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .logo-wrap {
    width: 110px;
    height: 110px;
    border-radius: 28px;
    background: #11201A;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 1px rgba(61, 220, 132, 0.18),
                0 0 40px rgba(61, 220, 132, 0.15);
    animation: pulse 1.8s ease-in-out infinite;
    overflow: hidden;
  }

  .logo-wrap img {
    width: 70%;
    height: 70%;
    object-fit: contain;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 1px rgba(61,220,132,0.18), 0 0 40px rgba(61,220,132,0.15); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 1px rgba(61,220,132,0.3), 0 0 60px rgba(61,220,132,0.28); }
  }

  /* ---------- IFRAME (actual site, URL hidden) ---------- */
  #siteFrame {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
    display: block;
    background: #0B0F0E;
  }

  /* ---------- Fallback message if iframe blocked ---------- */
  #fallback {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9998;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    color: #F4F4F2;
    background: #0B0F0E;
  }

  #fallback.show { display: flex; }

  #fallback p {
    margin-top: 16px;
    opacity: 0.7;
    font-size: 14px;
    max-width: 320px;
    line-height: 1.5;
  }

  #fallback a {
    margin-top: 18px;
    color: #3DDC84;
    text-decoration: none;
    font-size: 14px;
    border: 1px solid rgba(61,220,132,0.3);
    padding: 10px 20px;
    border-radius: 8px;
  }
</style>
</head>
<body>

  <!-- Fallback (only shows if the embedded site blocks iframes) -->
  <div id="fallback">
    <div class="logo-wrap" style="animation: none;">
      <img src="logo_web.png" alt="Logo" />
    </div>
    <p>Site is taking too long or can't be embedded directly here.</p>
    <a href="https://019f14a9-e0c9-7118-953b-cbb95e1732de.arena.site/" target="_blank" rel="noopener">Open Site</a>
  </div>

  <!-- Actual Website (URL hidden inside iframe) -->
  <iframe
    id="siteFrame"
    src="https://019f14a9-e0c9-7118-953b-cbb95e1732de.arena.site/?embed=true"
    title="Website"
    allow="clipboard-read; clipboard-write; fullscreen; geolocation; microphone; camera"
    allowfullscreen
    loading="eager"
  ></iframe>

  <script>
    const frame = document.getElementById('siteFrame');
    const fallback = document.getElementById('fallback');
    let loaded = false;

    frame.addEventListener('load', () => {
      loaded = true;
    });

    // Safety fallback: if nothing loads within 9s, show "Open Site" link
    setTimeout(() => {
      if (!loaded) {
        fallback.classList.add('show');
      }
    }, 9000);

    // Disable right-click on the wrapper (optional, light protection)
    document.addEventListener('contextmenu', (e) => e.preventDefault());
  </script>

</body>
</html>
