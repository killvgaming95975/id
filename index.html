<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web App</title>
    
    <!-- Hide referrer so the target site doesn't see where you came from -->
    <meta name="referrer" content="no-referrer">
    
    <link rel="icon" type="image/png" href="logo_web.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 24px;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: #888;
            margin-top: 16px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        /* Fullscreen iframe */
        #app-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>

    <!-- Loading Screen with your logo -->
    <div id="loader">
        <img src="logo_web.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <div class="spinner"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <!-- The hidden URL loads here -->
    <iframe 
        id="app-frame"
        src="https://019f14a9-e0c9-7118-953b-cbb95e1732de.arena.site/"
        allow="fullscreen; camera; microphone; geolocation; clipboard-write; autoplay"
        referrerpolicy="no-referrer"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads allow-top-navigation-by-user-activation"
    ></iframe>

    <script>
        const loader = document.getElementById('loader');
        const frame = document.getElementById('app-frame');

        // Hide loader once the iframe is loaded
        frame.onload = function() {
            setTimeout(() => {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 600);
            }, 500);
        };

        // Fallback: hide loader after 5 seconds anyway
        setTimeout(() => {
            if (loader) {
                loader.classList.add('hidden');
            }
        }, 5000);

        // Prevent right-click / inspect to make URL harder to find
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Block common devtool shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
               (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });

        // Keep the page title clean, don't leak the target URL
        history.replaceState(null, '', window.location.pathname);
    </script>
</body>
</html>
